<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#35c3d6"/>
      <stop offset="1" stop-color="#1793ab"/>
    </linearGradient>
    <linearGradient id="hive" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd24a"/>
      <stop offset="1" stop-color="#ffab1f"/>
    </linearGradient>
    <linearGradient id="hiveShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5b52e"/>
      <stop offset="1" stop-color="#e89610"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1024" height="1024" rx="188" fill="url(#bg)"/>

  <!-- soft ground shadow -->
  <ellipse cx="512" cy="852" rx="330" ry="42" fill="#0e6d80" opacity="0.45"/>

  <!-- skep beehive: stacked bands, widest at the base -->
  <!-- dome cap -->
  <path d="M 512 168 C 388 168 322 246 322 316 L 702 316 C 702 246 636 168 512 168 Z" fill="url(#hive)"/>
  <!-- bands -->
  <rect x="292" y="332" width="440" height="112" rx="56" fill="url(#hiveShade)"/>
  <rect x="252" y="460" width="520" height="112" rx="56" fill="url(#hive)"/>
  <rect x="222" y="588" width="580" height="112" rx="56" fill="url(#hiveShade)"/>
  <rect x="202" y="716" width="620" height="124" rx="62" fill="url(#hive)"/>

  <!-- entrance arch on the base band -->
  <path d="M 448 840 L 448 796 C 448 758 476 734 512 734 C 548 734 576 758 576 796 L 576 840 Z" fill="#1f4d57"/>

  <!-- Notion-style N badge on the middle of the hive -->
  <rect x="424" y="428" width="176" height="176" rx="30" fill="#ffffff"/>
  <rect x="424" y="428" width="176" height="176" rx="30" fill="none" stroke="#1f4d57" stroke-opacity="0.18" stroke-width="6"/>
  <text x="512" y="574" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="140" fill="#101010">N</text>
</svg>
