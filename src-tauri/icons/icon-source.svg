<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Hive icon v3 — honeycomb flower: six hex cells around a white Notion-
       style page (folded corner, serif N) on navy. -->
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="232"/>
    </clipPath>
  </defs>

  <g clip-path="url(#squircle)">
    <rect x="0" y="0" width="1024" height="1024" fill="#152238"/>

    <!-- flat-top hexes, R=132 (width 264, height ~229) -->
    <!-- top: yellow -->
    <polygon points="378,275 444,161 576,161 642,275 576,389 444,389" fill="#f5b21b" transform="translate(2,0)"/>
    <!-- upper-left: orange -->
    <polygon points="156,400 222,286 354,286 420,400 354,514 222,514" fill="#f7941e"/>
    <!-- upper-right: orange -->
    <polygon points="604,402 670,288 802,288 868,402 802,516 670,516" fill="#f7941e"/>
    <!-- lower-left: blue -->
    <polygon points="156,652 222,538 354,538 420,652 354,766 222,766" fill="#29abe2"/>
    <!-- lower-right: green -->
    <polygon points="604,652 670,538 802,538 868,652 802,766 670,766" fill="#a9c23f"/>
    <!-- bottom: teal -->
    <polygon points="378,777 444,663 576,663 642,777 576,891 444,891" fill="#1fa8a0"/>

    <!-- white page with folded corner -->
    <path d="M 342 384 Q 342 356 370 356 L 604 356 L 682 434 L 682 668 Q 682 696 654 696 L 370 696 Q 342 696 342 668 Z" fill="#f7f4ec"/>
    <path d="M 604 356 L 682 434 L 618 434 Q 604 434 604 420 Z" fill="#ddd8c8"/>
    <text x="500" y="614" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-weight="bold" font-size="240" fill="#101010">N</text>
  </g>
</svg>
